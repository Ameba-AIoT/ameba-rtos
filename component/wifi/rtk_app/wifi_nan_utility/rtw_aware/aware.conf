{
	"bin_path": {
		"iw": {
			"iw_path": "/usr/bin/iw",
		},
		"nan_r3": {
			"nan_r3_path": "../bin/nan_r3",
		},
		"wpa_supplicant": {
            "wpa_supplicant_path": "/usr/sbin/wpa_supplicant",
            "wpa_supplicant_conf_path": "/etc/wpa_supplicant/nan_pairing.conf",
            "wpa_supplicant_log_file": "./nan_supplicant.log",
            "wpa_supplicant_dbg_para": "-dd",
        },
    },
    "basic": {
        "mac_addr": "00:e0:4c:00:12:9d",
    },

	"dns_sd_record": {
		"publish1": {
			"publish_id": "1",
			"service_name": "_ipp._tcp",
			"name_of_service_instance": "My Cool Printer",
			"textinfo": "0x0E | vendorName=RTK | 0x14 | pairingName=RTK_pair | 0x12 | modelName=RTL8721F",
			"hostname": "printer123",
			"port_number": "8000",
			"security": "pairing",
			"pmk_key": "123456789abcdef0123456789abcdef1",
			"start_cmd": "sudo bash ./hooks.sh",
			"end_cmd": "sudo bash ./hooks.sh",
			"bstrap_method": "pin_code passphrase",
			"pairing_passphrase": "123456",
			"nik_caching": "1",
			"gtk_enable": "1",
		},
		"subscribe": {
			"subscribe_id": "1",
			"service_name": "_ipp._tcp",
			"name_of_service_instance": "My Cool Printer_1",
			"textinfo": "0x0E | vendorName=RTK | 0x14 | pairingName=RTK_pair | 0x12 | modelName=RTL8721F",
			"hostname": "printer123",
			"port_number": "8000",
			"security": "pairing",
			"pmk_key": "123456789abcdef0123456789abcdef1",
			"start_cmd": "sudo bash ./hooks.sh",
			"end_cmd": "sudo bash ./hooks.sh",
			"bstrap_method": "pin_code",
			"pairing_passphrase": "123456",
			"nik_caching": "1",
			"gtk_enable": "1",
		}
	}
}
